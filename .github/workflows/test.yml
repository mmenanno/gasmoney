name: test

# Reusable workflow. ci.yml invokes this via `uses:` so the test suite
# has to pass before image build or publish run. Not triggered on its
# own — pull_request / push entry points live in ci.yml so we don't get
# duplicate "test" check runs in the PR UI.
on:
  workflow_call:

jobs:
  minitest:
    name: minitest
    runs-on: ubuntu-latest
    # Match the 4 vCPUs that GitHub Actions Linux runners actually expose.
    # Etc.nprocessors underreports as 2, so :number_of_processors would
    # undershoot.
    env:
      MINITEST_WORKERS: 4
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rake test
