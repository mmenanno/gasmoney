name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  version-bump-check:
    name: VERSION bump
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    outputs:
      # Signals that the diff cannot affect the released container image,
      # so downstream build-per-arch and publish can skip. Docs-only and
      # `.github/**` (workflows, dependabot config) qualify; dependency
      # lockfile bumps do not because they DO change what gets baked into
      # the image.
      skip_build: ${{ steps.check.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve diff base
        id: base
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if [[ "$EVENT" == "pull_request" ]]; then
            echo "ref=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$PUSH_BEFORE" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce VERSION bump
        id: check
        env:
          ACTOR: ${{ github.actor }}
          BASE: ${{ steps.base.outputs.ref }}
        run: |
          echo "skip_build=false" >> "$GITHUB_OUTPUT"

          # Exemption 1: dependabot pushed (covers the PR-branch run).
          if [[ "$ACTOR" == "dependabot[bot]" ]]; then
            echo "Dependabot author; VERSION bump not required."
            exit 0
          fi

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "No diff base; skipping."
            exit 0
          fi

          # Exemption 2: every non-merge commit in the diff range was authored
          # by dependabot (covers PRs merged via the GitHub UI, where the merge
          # commit is authored by the merger but the underlying changes are
          # still dependabot's).
          authors=$(git log --no-merges --format='%ae' "$BASE"..HEAD)
          total_commits=$(printf '%s\n' "$authors" | grep -c '.' || true)
          dependabot_commits=$(printf '%s\n' "$authors" | grep -cF 'dependabot[bot]@' || true)
          if [[ "$total_commits" -gt 0 && "$total_commits" == "$dependabot_commits" ]]; then
            echo "All ${total_commits} non-merge commit(s) authored by dependabot; VERSION bump not required."
            exit 0
          fi

          changed=$(git diff --name-only "$BASE" HEAD)
          if [[ -z "$changed" ]]; then
            echo "No file changes; skipping."
            exit 0
          fi

          # Release-irrelevant paths: markdown, LICENSE, anything under
          # .github/. None of these end up in the released container image.
          release_relevant=$(printf '%s\n' "$changed" \
            | grep -vE '\.md$' \
            | grep -vx 'LICENSE' \
            | grep -vE '^\.github/' || true)
          if [[ -z "$release_relevant" ]]; then
            echo "Release-irrelevant change (docs or .github/); VERSION bump not required."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$changed" | grep -qx 'VERSION'; then
            echo "VERSION bumped."
            exit 0
          fi

          echo "::error::VERSION must be bumped for changes that affect the released image."
          echo "Release-relevant changed files:"
          printf '%s\n' "$release_relevant"
          exit 1

  build-per-arch:
    # Each arch builds on its native runner (free for public repos) and
    # pushes the per-arch image to GHCR by digest only — no human-readable
    # tag yet. The publish job below stitches the digests into a single
    # multi-arch manifest list and applies the human tags. Native runners
    # avoid QEMU emulation, which would otherwise multiply build wall-clock.
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [lint, test, version-bump-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version-bump-check.outputs.skip_build != 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION
        id: version
        run: echo "value=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/mmenanno/gasmoney,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_REF=${{ github.ref_name }}
            BUILD_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    # Stitches the per-arch digests into a multi-arch manifest list,
    # tags it (:latest, :v<version>, :sha-<short>), pushes the matching
    # git tag, and creates a GitHub Release whose body is the matching
    # CHANGELOG section plus a Container image trailer with the manifest
    # digest for digest-pinned pulls.
    name: ghcr release
    runs-on: ubuntu-latest
    needs: [build-per-arch]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION
        id: version
        run: echo "value=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest list
        id: manifest
        env:
          VERSION: ${{ steps.version.outputs.value }}
          IMAGE: ghcr.io/mmenanno/gasmoney
          GITHUB_SHA: ${{ github.sha }}
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          tag_args=()
          for tag in "v${VERSION}" "latest" "sha-${short_sha}"; do
            tag_args+=(-t "${IMAGE}:${tag}")
          done
          source_args=()
          for f in /tmp/digests/*; do
            source_args+=("${IMAGE}@sha256:$(basename "$f")")
          done
          docker buildx imagetools create "${tag_args[@]}" "${source_args[@]}"
          manifest_digest=$(docker buildx imagetools inspect "${IMAGE}:v${VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${manifest_digest}" >> "$GITHUB_OUTPUT"

      - name: Tag release
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Check the remote, not the local clone. The runner's checkout
          # doesn't fetch tags, so a local rev-parse would always claim
          # the tag is missing and the subsequent push would fail when
          # the remote already has it.
          if git ls-remote --tags --exit-code origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists on remote; skipping push"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Build release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.value }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
          IMAGE: ghcr.io/mmenanno/gasmoney
        run: |
          awk -v v="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\["v"\\]") { found=1; next } }
            found
          ' CHANGELOG.md > .release-notes.md
          if [[ ! -s .release-notes.md ]]; then
            awk '
              /^## \[/ { if (found) exit; if ($0 ~ /\[Unreleased\]/) { found=1; next } }
              found
            ' CHANGELOG.md > .release-notes.md
          fi
          {
            echo ""
            echo "## Container image"
            echo ""
            echo '```bash'
            echo "docker pull ${IMAGE}:v${VERSION}"
            echo "# or pin by digest:"
            echo "docker pull ${IMAGE}@${DIGEST}"
            echo '```'
            echo ""
            echo "Available platforms: \`linux/amd64\`, \`linux/arm64\`."
            echo ""
            echo "[View on GHCR](https://github.com/mmenanno/gasmoney/pkgs/container/gasmoney)"
          } >> .release-notes.md
          echo "path=.release-notes.md" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body_path: ${{ steps.notes.outputs.path }}
          fail_on_unmatched_files: false
