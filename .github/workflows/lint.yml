name: lint

# Reusable workflow. CI's main pipeline and the build job both `uses:` this
# so RuboCop's verdict is the gate before any image leaves the runner.
on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rubocop:
    name: rubocop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rubocop --no-server
