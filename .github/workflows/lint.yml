name: lint

# Reusable workflow. ci.yml invokes this via `uses:` so RuboCop's verdict
# is the gate before tests, image build, or publish run. Not triggered
# on its own — pull_request / push entry points live in ci.yml so we
# don't get duplicate "lint" check runs in the PR UI.
on:
  workflow_call:

jobs:
  rubocop:
    name: rubocop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rubocop --no-server
